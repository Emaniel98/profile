<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>木村の自己紹介</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", sans-serif;
      background: linear-gradient(to bottom, #fff0f5, #e6ffe6);
      color: #555;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: rgba(255, 182, 193, 0.4);
    }

    header h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 18px;
    }

    section {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    h2 {
      border-left: 6px solid #ffb6c1;
      padding-left: 10px;
      color: #ff69b4;
    }

    ul {
      line-height: 1.8;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #888;
    }

    .flower {
      font-size: 24px;
    }
  </style>
</head>
<body>

  <header>
    <h1>🌸 木村の自己紹介 🌸</h1>
    <p>春のようにやさしく、あたたかく。</p>
  </header>

  <section>
    <h2>🌷 プロフィール</h2>
    <ul>
      <li>名前：木村</li>
      <li>出身：日本</li>
      <li>性格：穏やか・マイペース・好奇心旺盛</li>
      <li>趣味：散歩・読書・カフェ巡り</li>
    </ul>
  </section>

  <section>
    <h2>🌼 好きなこと</h2>
    <p>
      春の季節が大好きで、桜並木を歩いたり、
      カフェでゆっくり過ごす時間を大切にしています。
      日常の中の小さな幸せを見つけるのが楽しみです。
    </p>
  </section>

  <section>
    <h2>🌱 大切にしていること</h2>
    <p>
      人とのつながりや、何気ない日々の瞬間を大切にしています。
      春の芽吹きのように、少しずつ成長していけたらと思っています。
    </p>
  </section>

  <footer>
    <p>© 2026 木村</p>
  </footer>

</body>
</html>
